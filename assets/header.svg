<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="900" height="260" rx="16"/>
    </clipPath>
    <style>
      .cursor { animation: blink 1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .sym { animation: pulse 4s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 0.12; } 50% { opacity: 0.32; } }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="260" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <g clip-path="url(#cardClip)">
    <!-- title bar -->
    <circle cx="28" cy="28" r="6" fill="#ff5f56"/>
    <circle cx="48" cy="28" r="6" fill="#ffbd2e"/>
    <circle cx="68" cy="28" r="6" fill="#27c93f"/>
    <rect x="380" y="14" width="140" height="28" rx="6" fill="#161b22"/>
    <text x="450" y="33" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#8b949e">main.c</text>
    <line x1="0" y1="50" x2="900" y2="50" stroke="#21262d" stroke-width="1"/>

    <!-- matrix rain, left margin -->
    <g font-family="Consolas, monospace" font-size="14" fill="#39d353" opacity="0.18">
      <text x="30" y="0">
        <tspan x="30" dy="18">01</tspan><tspan x="30" dy="18">10</tspan><tspan x="30" dy="18">&#8721;</tspan><tspan x="30" dy="18">11</tspan><tspan x="30" dy="18">&#960;</tspan><tspan x="30" dy="18">00</tspan><tspan x="30" dy="18">&#955;</tspan><tspan x="30" dy="18">01</tspan><tspan x="30" dy="18">10</tspan>
        <animateTransform attributeName="transform" type="translate" from="0,-100" to="0,320" dur="9s" repeatCount="indefinite"/>
      </text>
      <text x="90" y="0">
        <tspan x="90" dy="18">10</tspan><tspan x="90" dy="18">&#8734;</tspan><tspan x="90" dy="18">01</tspan><tspan x="90" dy="18">00</tspan><tspan x="90" dy="18">11</tspan><tspan x="90" dy="18">&#8730;</tspan><tspan x="90" dy="18">10</tspan><tspan x="90" dy="18">01</tspan>
        <animateTransform attributeName="transform" type="translate" from="0,-260" to="0,320" dur="7s" repeatCount="indefinite"/>
      </text>
      <text x="140" y="0">
        <tspan x="140" dy="18">&#955;</tspan><tspan x="140" dy="18">01</tspan><tspan x="140" dy="18">10</tspan><tspan x="140" dy="18">&#402;</tspan><tspan x="140" dy="18">00</tspan><tspan x="140" dy="18">11</tspan><tspan x="140" dy="18">01</tspan>
        <animateTransform attributeName="transform" type="translate" from="0,-40" to="0,320" dur="11s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- matrix rain, right margin -->
    <g font-family="Consolas, monospace" font-size="14" fill="#39d353" opacity="0.18">
      <text x="770" y="0">
        <tspan x="770" dy="18">00</tspan><tspan x="770" dy="18">&#8721;</tspan><tspan x="770" dy="18">11</tspan><tspan x="770" dy="18">01</tspan><tspan x="770" dy="18">&#960;</tspan><tspan x="770" dy="18">10</tspan><tspan x="770" dy="18">00</tspan><tspan x="770" dy="18">11</tspan>
        <animateTransform attributeName="transform" type="translate" from="0,-180" to="0,320" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="820" y="0">
        <tspan x="820" dy="18">01</tspan><tspan x="820" dy="18">10</tspan><tspan x="820" dy="18">&#8734;</tspan><tspan x="820" dy="18">00</tspan><tspan x="820" dy="18">&#955;</tspan><tspan x="820" dy="18">11</tspan><tspan x="820" dy="18">01</tspan>
        <animateTransform attributeName="transform" type="translate" from="0,-300" to="0,320" dur="10s" repeatCount="indefinite"/>
      </text>
      <text x="865" y="0">
        <tspan x="865" dy="18">10</tspan><tspan x="865" dy="18">01</tspan><tspan x="865" dy="18">&#8730;</tspan><tspan x="865" dy="18">00</tspan><tspan x="865" dy="18">11</tspan><tspan x="865" dy="18">&#402;</tspan><tspan x="865" dy="18">10</tspan>
        <animateTransform attributeName="transform" type="translate" from="0,-80" to="0,320" dur="6.5s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- floating math symbols -->
    <text class="sym" x="855" y="75" font-family="Georgia, serif" font-size="34" fill="#58a6ff" opacity="0.15">&#8721;</text>
    <text class="sym" x="45" y="230" font-family="Georgia, serif" font-size="30" fill="#d2a8ff" opacity="0.15" style="animation-delay:1.3s">&#960;</text>
    <text class="sym" x="820" y="235" font-family="Georgia, serif" font-size="26" fill="#ffa657" opacity="0.15" style="animation-delay:2.1s">&#8734;</text>

    <!-- code block -->
    <g font-family="'Fira Code', Consolas, monospace" font-size="19">
      <text x="190" y="95"><tspan fill="#ff7b72">const</tspan><tspan fill="#c9d1d9"> engineer = {</tspan></text>
      <text x="210" y="128"><tspan fill="#79c0ff">focus</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#a5d6ff">"DSA &#8226; AI/ML &#8226; Competitive Programming"</tspan><tspan fill="#c9d1d9">,</tspan></text>
      <text x="210" y="161"><tspan fill="#79c0ff">status</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#a5d6ff">"Building intelligent systems"</tspan><tspan fill="#c9d1d9">,</tspan></text>
      <text x="210" y="194"><tspan fill="#79c0ff">mindset</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#a5d6ff">"struggle first, then solve"</tspan></text>
      <text x="190" y="227"><tspan fill="#c9d1d9">};</tspan><tspan class="cursor" fill="#58a6ff"> &#9615;</tspan></text>
    </g>
  </g>
</svg>
