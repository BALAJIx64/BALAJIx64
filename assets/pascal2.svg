        <text x="360" y="225" fill="#f8fafc">5</text>
        <text x="420" y="225" fill="#60a5fa">10</text>
        <text x="480" y="225" fill="#60a5fa">10</text>
        <text x="540" y="225" fill="#f8fafc">5</text>
        <text x="600" y="225" fill="#f8fafc">1</text>
      </g>
      <g class="pr6">
        <text x="270" y="257" fill="#f8fafc">1</text>
        <text x="330" y="257" fill="#60a5fa">6</text>
        <text x="390" y="257" fill="#f8fafc">15</text>
        <text x="450" y="257" fill="#60a5fa">20</text>
        <text x="510" y="257" fill="#f8fafc">15</text>
        <text x="570" y="257" fill="#60a5fa">6</text>
        <text x="630" y="257" fill="#f8fafc">1</text>
      </g>
      <g class="pr7">
        <text x="240" y="289" fill="#f8fafc">1</text>
        <text x="300" y="289" fill="#f8fafc">7</text>
        <text x="360" y="289" fill="#f8fafc">21</text>
        <text x="420" y="289" fill="#f8fafc">35</text>
        <text x="480" y="289" fill="#f8fafc">35</text>
        <text x="540" y="289" fill="#f8fafc">21</text>
        <text x="600" y="289" fill="#f8fafc">7</text>
        <text x="660" y="289" fill="#f8fafc">1</text>
      </g>
      <g class="pr8">
        <text x="210" y="321" fill="#f8fafc">1</text>
        <text x="270" y="321" fill="#60a5fa">8</text>
        <text x="330" y="321" fill="#60a5fa">28</text>
        <text x="390" y="321" fill="#60a5fa">56</text>
        <text x="450" y="321" fill="#60a5fa">70</text>
        <text x="510" y="321" fill="#60a5fa">56</text>
        <text x="570" y="321" fill="#60a5fa">28</text>
        <text x="630" y="321" fill="#60a5fa">8</text>
        <text x="690" y="321" fill="#f8fafc">1</text>
      </g>
    </g>

    <text x="450" y="354" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#94a3b8">White = odd, blue = even — the pattern hints at Sierpinski's Triangle</text>
  </g>
</svg>
