        <text x="450" y="129" fill="#60a5fa">2</text>
        <text x="510" y="129" fill="#f8fafc">1</text>
      </g>
      <g class="pr3">
        <text x="360" y="161" fill="#f8fafc">1</text>
        <text x="420" y="161" fill="#f8fafc">3</text>
        <text x="480" y="161" fill="#f8fafc">3</text>
        <text x="540" y="161" fill="#f8fafc">1</text>
      </g>
      <g class="pr4">
        <text x="330" y="193" fill="#f8fafc">1</text>
        <text x="390" y="193" fill="#60a5fa">4</text>
        <text x="450" y="193" fill="#60a5fa">6</text>
        <text x="510" y="193" fill="#60a5fa">4</text>
