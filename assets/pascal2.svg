<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <defs>
    <clipPath id="pascalClip2">
      <rect x="0" y="0" width="900" height="380" rx="16"/>
    </clipPath>
    <style>
      @keyframes pr0 { 0% { opacity: 0; } 2.7% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes pr1 { 0%, 4.5% { opacity: 0; } 7.3% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes pr2 { 0%, 9.1% { opacity: 0; } 11.8% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes pr3 { 0%, 13.6% { opacity: 0; } 16.4% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes pr4 { 0%, 18.2% { opacity: 0; } 20.9% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes pr5 { 0%, 22.7% { opacity: 0; } 25.5% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes pr6 { 0%, 27.3% { opacity: 0; } 30.0% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes pr7 { 0%, 31.8% { opacity: 0; } 34.5% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes pr8 { 0%, 36.4% { opacity: 0; } 39.1% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      .pr0 { animation: pr0 11s ease-in-out infinite; }
      .pr1 { animation: pr1 11s ease-in-out infinite; }
      .pr2 { animation: pr2 11s ease-in-out infinite; }
      .pr3 { animation: pr3 11s ease-in-out infinite; }
      .pr4 { animation: pr4 11s ease-in-out infinite; }
      .pr5 { animation: pr5 11s ease-in-out infinite; }
      .pr6 { animation: pr6 11s ease-in-out infinite; }
      .pr7 { animation: pr7 11s ease-in-out infinite; }
      .pr8 { animation: pr8 11s ease-in-out infinite; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="380" rx="16" fill="#111a33" stroke="#3b82f6" stroke-opacity="0.2"/>

