<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <clipPath id="pascalClip">
      <rect x="0" y="0" width="900" height="400" rx="16"/>
    </clipPath>
    <style>
      @keyframes r0 { 0% { opacity: 0; } 2.7% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes r1 { 0%, 4.5% { opacity: 0; } 7.3% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes r2 { 0%, 9.1% { opacity: 0; } 11.8% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes r3 { 0%, 13.6% { opacity: 0; } 16.4% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes r4 { 0%, 18.2% { opacity: 0; } 20.9% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes r5 { 0%, 22.7% { opacity: 0; } 25.5% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes r6 { 0%, 27.3% { opacity: 0; } 30.0% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes r7 { 0%, 31.8% { opacity: 0; } 34.5% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      @keyframes r8 { 0%, 36.4% { opacity: 0; } 39.1% { opacity: 1; } 72.7% { opacity: 1; } 77.3% { opacity: 0; } 100% { opacity: 0; } }
      .r0 { animation: r0 11s ease-in-out infinite; }
      .r1 { animation: r1 11s ease-in-out infinite; }
      .r2 { animation: r2 11s ease-in-out infinite; }
      .r3 { animation: r3 11s ease-in-out infinite; }
      .r4 { animation: r4 11s ease-in-out infinite; }
      .r5 { animation: r5 11s ease-in-out infinite; }
      .r6 { animation: r6 11s ease-in-out infinite; }
      .r7 { animation: r7 11s ease-in-out infinite; }
      .r8 { animation: r8 11s ease-in-out infinite; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="400" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <g clip-path="url(#pascalClip)">
    <!-- title bar -->
    <circle cx="28" cy="28" r="6" fill="#ff5f56"/>
    <circle cx="48" cy="28" r="6" fill="#ffbd2e"/>
    <circle cx="68" cy="28" r="6" fill="#27c93f"/>
    <rect x="360" y="14" width="180" height="28" rx="6" fill="#161b22"/>
    <text x="450" y="33" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#8b949e">pascals_triangle.py</text>
    <line x1="0" y1="50" x2="900" y2="50" stroke="#21262d" stroke-width="1"/>

    <!-- rows: fill #79c0ff = odd, #ffa657 = even -->
    <g font-family="'Fira Code', Consolas, monospace" font-size="16" text-anchor="middle">

      <g class="r0">
        <text x="450" y="85" fill="#79c0ff">1</text>
      </g>

      <g class="r1">
        <text x="420" y="117" fill="#79c0ff">1</text>
        <text x="480" y="117" fill="#79c0ff">1</text>
      </g>

      <g class="r2">
        <text x="390" y="149" fill="#79c0ff">1</text>
        <text x="450" y="149" fill="#ffa657">2</text>
        <text x="510" y="149" fill="#79c0ff">1</text>
      </g>

      <g class="r3">
        <text x="360" y="181" fill="#79c0ff">1</text>
        <text x="420" y="181" fill="#79c0ff">3</text>
        <text x="480" y="181" fill="#79c0ff">3</text>
        <text x="540" y="181" fill="#79c0ff">1</text>
      </g>

      <g class="r4">
        <text x="330" y="213" fill="#79c0ff">1</text>
        <text x="390" y="213" fill="#ffa657">4</text>
        <text x="450" y="213" fill="#ffa657">6</text>
        <text x="510" y="213" fill="#ffa657">4</text>
        <text x="570" y="213" fill="#79c0ff">1</text>
      </g>

      <g class="r5">
        <text x="300" y="245" fill="#79c0ff">1</text>
        <text x="360" y="245" fill="#79c0ff">5</text>
        <text x="420" y="245" fill="#ffa657">10</text>
        <text x="480" y="245" fill="#ffa657">10</text>
        <text x="540" y="245" fill="#79c0ff">5</text>
        <text x="600" y="245" fill="#79c0ff">1</text>
      </g>

      <g class="r6">
        <text x="270" y="277" fill="#79c0ff">1</text>
        <text x="330" y="277" fill="#ffa657">6</text>
        <text x="390" y="277" fill="#79c0ff">15</text>
        <text x="450" y="277" fill="#ffa657">20</text>
        <text x="510" y="277" fill="#79c0ff">15</text>
        <text x="570" y="277" fill="#ffa657">6</text>
        <text x="630" y="277" fill="#79c0ff">1</text>
      </g>

      <g class="r7">
        <text x="240" y="309" fill="#79c0ff">1</text>
        <text x="300" y="309" fill="#79c0ff">7</text>
        <text x="360" y="309" fill="#79c0ff">21</text>
        <text x="420" y="309" fill="#79c0ff">35</text>
        <text x="480" y="309" fill="#79c0ff">35</text>
        <text x="540" y="309" fill="#79c0ff">21</text>
        <text x="600" y="309" fill="#79c0ff">7</text>
        <text x="660" y="309" fill="#79c0ff">1</text>
      </g>

      <g class="r8">
        <text x="210" y="341" fill="#79c0ff">1</text>
        <text x="270" y="341" fill="#ffa657">8</text>
        <text x="330" y="341" fill="#ffa657">28</text>
        <text x="390" y="341" fill="#ffa657">56</text>
        <text x="450" y="341" fill="#ffa657">70</text>
        <text x="510" y="341" fill="#ffa657">56</text>
        <text x="570" y="341" fill="#ffa657">28</text>
        <text x="630" y="341" fill="#ffa657">8</text>
        <text x="690" y="341" fill="#79c0ff">1</text>
      </g>
    </g>

    <text x="450" y="374" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#8b949e" opacity="0.75"># blue = odd, orange = even — the pattern hints at Sierpinski's Triangle</text>
  </g>
</svg>
